services:
  # ─── Backend API ───────────────────────────────────────────────
  - type: web
    name: nomadnest-backend
    env: node
    region: singapore          # Closest to Goa for low latency
    plan: free                 # Free tier on Render
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ANTHROPIC_API_KEY
        sync: false            # Set this manually in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: nomadnest-frontend
          property: host

  # ─── Frontend (static site) ────────────────────────────────────
  - type: web
    name: nomadnest-frontend
    env: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nomadnest-backend
          property: host

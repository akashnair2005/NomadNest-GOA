services:
  # ─── Backend API ───────────────────────────────────────────────
  - type: web
    name: nomadnest-backend
    env: node
    region: singapore          # Closest to Goa for low latency
    plan: starter              # Starter plan (with your $50 credit)
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ANTHROPIC_API_KEY
        sync: false            # Set this manually in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: nomadnest-frontend
          property: host

  # ─── Frontend (static site) ────────────────────────────────────
  - type: static
    name: nomadnest-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nomadnest-backend
          property: host
